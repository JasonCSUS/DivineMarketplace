# DivineMarketplace main behavior config
# This file is copied into plugins/DivineMarketplace/config.yml on first run.
#
# Money rule:
# - all internal money values are stored as integer hundredths
# - convert to decimal only when displaying values or calling Vault

storage:
  database:
    sqliteFile: "data/market.db"
    modulePrefix: "market"
  limits:
    salesHistoryMaxMb: 50
    adminSalesHistoryMaxMb: 25
    adminListingsHistoryMaxMb: 25
    adminClaimsHistoryMaxMb: 25
    itemClaimsSoftMaxMb: 100
  cleanup:
    abandonedItemClaimDays: 30

customItems:
  autoDiscoverUnknownItems: true
  autoWriteDefinitionsImmediately: true
  defaultCategory: "unsorted"
  useClonedItemForPreviewTemplate: true
  requireAdminReviewForAllNewItems: true
  highPriorityOnlyForUnsafeResolution: true

listingPolicies:
  default:
    maxListings: 15
    listingDurationDays: 7
  tiers:
    - permission: "divinemarketplace.tier.1"
      maxListings: 30
      listingDurationDays: 14
    - permission: "divinemarketplace.tier.2"
      maxListings: 50
      listingDurationDays: 21
    - permission: "divinemarketplace.tier.3"
      maxListings: 100
      listingDurationDays: 28

claims:
  claimMenuUsesSafeChunkRedemption: true
  shiftClickClaimsAsMuchAsSafelyFits: true
  # Buyers can purchase into an existing mergeable claim, or into one free claim slot.
  # If all claim slots are occupied, the GUI should close and tell them to empty claim storage first.
  maxActiveItemClaims: 54

packages:
  previewMode: "EXACT" # EXACT or SIMPLIFIED
  keepExactPayloadInFileStorage: true
  keepExactPayloadCachedInMemory: false

market:
  recalcIntervalHours: 24
  perItemMinimumRecalcHours: 24
  recalcItemsPerRun: 5
  saleLookbackDays: 30

  thresholds:
    samePercent: 5.0
    smallAdjustmentPercent: 10.0
    mediumAdjustmentPercent: 15.0
    majorOverpricedPercent: 100.0
    majorUnderpricedPercent: 50.0

  adjustment:
    minimumPercent: 1.0
    maximumPercent: 50.0

  trend:
    fitnessThreshold: 0.60
    minimumSaleSamples: 3
    minimumListingSamples: 3

search:
  partialMatching: true
  minTokenLength: 2
  maxResultsPerPage: 20

admin:
  alertUnknownCustomItems: true
  alertUnknownCustomEnchants: true
  writeUnknownDefinitionsImmediately: true
  allowInGameDefinitionCommands: true
  regeneratePermissionsFileOnReload: false

ui:
  defaultSortMode: "NEWEST_FIRST"
  showEmptyTopLevelCategories: true
  showListingCountsInCategoryLore: true
  interceptAllInventoryClicks: true


customItemIdentity:
  # Runtime custom identity pipeline:
  # 1) treat-as-vanilla override
  # 2) existing confirmed definition by stable itemType or material+CMD fallback
  # 3) ordered exact-key rules below (first match wins)
  # 4) unknown custom-model-data fallback
  # 5) vanilla fallback
  unknownCustomModelData:
    enabled: true
    autoCreateDefinition: true
    category: "unsorted"
  metadataSnapshots:
    # Unknown/provisional snapshots are deduped by stable signature.
    writeUnknownSnapshots: true
    writeInspectRawSnapshots: true
    directory: "logs/custom_item_metadata"
  rules:
    - id: "server_item_type"
      source: "any_key"
      key: "item_type"
      resultMode: "RAW_VALUE"
      prefix: ""
      appendMaterial: false
      appendCustomModelData: false

    - id: "mythicmobs_type"
      source: "public_bukkit_values"
      key: "mythicmobs:type"
      resultMode: "PREFIXED_VALUE"
      prefix: "mythicmobs"
      appendMaterial: false
      appendCustomModelData: false

    - id: "itemsadder_namespace"
      source: "serialize_section"
      section: "itemsadder"
      key: "namespace"
      resultMode: "PREFIXED_VALUE"
      prefix: "itemsadder"
      appendMaterial: true
      appendCustomModelData: true
