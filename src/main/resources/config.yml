# DivineMarketplace main behavior config
# This file is intended to be human-editable.
#
# Money rule:
# - all internal money values are stored as integer hundredths
# - convert to decimal only when displaying values or calling Vault

storage:
  definitions:
    categories: YAML
    customItems: YAML
    customEnchants: YAML
  runtime:
    listings: BINARY
    itemClaims: BINARY
    moneyClaims: BINARY
    sales: BINARY
    marketProfiles: BINARY
    packageCache: BINARY
    unknownCustomItems: BINARY
    unknownCustomEnchants: BINARY
    adminSales: BINARY
    adminListings: BINARY
    adminClaims: BINARY
  sql:
    enabled: false
    host: localhost
    port: 3306
    database: divinemarketplace
    username: root
    password: change_me
  limits:
    salesHistoryMaxMb: 50
    adminSalesHistoryMaxMb: 25
    adminListingsHistoryMaxMb: 25
    adminClaimsHistoryMaxMb: 25
    itemClaimsSoftMaxMb: 100
  cleanup:
    abandonedItemClaimDays: 30

customItems:
  autoDiscoverUnknownItems: true
  autoWriteDefinitionsImmediately: true
  defaultCategory: unsorted
  useClonedItemForPreviewTemplate: true
  requireAdminReviewForAllNewItems: true
  highPriorityOnlyForUnsafeResolution: true

listingPolicies:
  default:
    maxListings: 15
    listingDurationDays: 7
  tiers:
    - permission: "divinemarketplace.tier.1"
      maxListings: 30
      listingDurationDays: 14
    - permission: "divinemarketplace.tier.2"
      maxListings: 50
      listingDurationDays: 21
    - permission: "divinemarketplace.tier.3"
      maxListings: 100
      listingDurationDays: 28

claims:
  claimMenuUsesSafeChunkRedemption: true
  shiftClickClaimsAsMuchAsSafelyFits: true

packages:
  previewMode: EXACT # EXACT or SIMPLIFIED
  keepExactPayloadInFileStorage: true
  keepExactPayloadCachedInMemory: false

market:
  recalcIntervalHours: 6
  maxPriceMovePercentPerRecalc: 50.0
  minPriceMovePercentPerRecalc: 1.0
  sameThresholdPercent: 5.0
  smallThresholdPercent: 10.0
  mediumThresholdPercent: 15.0
  largeThresholdPercent: 100.0
  lowerCrashThresholdPercent: 50.0
  smallMoveFractionTowardTarget: 0.10
  mediumMoveFractionTowardTarget: 0.25
  largeMoveFractionTowardTarget: 0.33
  majorMoveFractionTowardTarget: 0.50
  minSamplesForTrend: 5
  trendWindowHours: 24

search:
  partialMatching: true
  minTokenLength: 2
  maxResultsPerPage: 20

admin:
  alertUnknownCustomItems: true
  alertUnknownCustomEnchants: true
  writeUnknownDefinitionsImmediately: true
  allowInGameDefinitionCommands: true
  regeneratePermissionsFileOnReload: false

ui:
  categoryGridRows: 4
  categoryGridColumns: 5
  showEmptyTopLevelCategories: true
  showListingCountsInCategoryLore: true
  interceptAllInventoryClicks: true
