# Bukkit/Paper plugin descriptor.
# Registers the main plugin class, /market command, dependencies, and built-in permissions.
name: DivineMarketplace
version: 1.0.0
main: divinejason.divinemarketplace.DivineMarketplace
api-version: "1.21"
author: Jason
description: Auction house and market analytics plugin
depend:
  - Vault
softdepend:
  - ItemsAdder
commands:
  market:
    description: Open and manage the DivineMarketplace UI
    usage: /market [subcommand]
permissions:
  divinemarketplace.use:
    description: Allows use of the marketplace
    default: true
  divinemarketplace.claim:
    description: Allows claiming owed items and earnings
    default: true
  divinemarketplace.admin:
    description: Full access to DivineMarketplace admin controls
    default: op
    children:
      divinemarketplace.admin.reload: true
      divinemarketplace.admin.recalc: true
      divinemarketplace.admin.price.set: true
      divinemarketplace.admin.listing.cancel: true
      divinemarketplace.admin.history.view: true
      divinemarketplace.admin.history.export: true
      divinemarketplace.admin.item.sort: true
      divinemarketplace.admin.item.define: true
      divinemarketplace.admin.enchant.define: true
      divinemarketplace.admin.flagged.view: true
      divinemarketplace.admin.collisions.view: true
      divinemarketplace.admin.inspect: true
      divinemarketplace.admin.custom.override: true
      divinemarketplace.admin.storage: true
  divinemarketplace.admin.reload:
    description: Reload DivineMarketplace configs and cached runtime state
    default: op
  divinemarketplace.admin.recalc:
    description: Recalculate market profiles and recommended prices
    default: op
  divinemarketplace.admin.price.set:
    description: Manually set recommended price for a market key
    default: op
  divinemarketplace.admin.listing.cancel:
    description: Cancel another player's listing
    default: op
  divinemarketplace.admin.history.view:
    description: View admin history in-game
    default: op
  divinemarketplace.admin.history.export:
    description: Export admin history to readable files
    default: op
  divinemarketplace.admin.item.sort:
    description: Change item category placement
    default: op
  divinemarketplace.admin.item.define:
    description: Define or update held custom item metadata
    default: op
  divinemarketplace.admin.enchant.define:
    description: Define or update custom enchant metadata
    default: op
  divinemarketplace.admin.flagged.view:
    description: View flagged and review-needed items
    default: op
  divinemarketplace.admin.collisions.view:
    description: View custom item collision log entries
    default: op
  divinemarketplace.admin.inspect:
    description: Inspect held item metadata and custom-item rule matches
    default: op
  divinemarketplace.admin.custom.override:
    description: Mark held false-positive custom items as vanilla or remove overrides
    default: op
  divinemarketplace.admin.storage:
    description: View SQLite storage usage and run retention cleanup
    default: op
